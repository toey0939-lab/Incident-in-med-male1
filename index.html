<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Risk Management - Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: #ffffff; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .severity-badge { display: flex; align-items: center; justify-content: center; height: 3.5rem; font-size: 1.25rem; font-weight: 700; border-radius: 1rem; cursor: pointer; border-width: 2px; transition: 0.2s; }
        .severity-active { transform: scale(1.05); border-width: 4px !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); outline: 2px solid white; }
        
        .color-A { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }
        .color-B { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .color-C { background: #eef2ff; color: #4f46e5; border-color: #c7d2fe; }
        .color-D { background: #e0e7ff; color: #4338ca; border-color: #a5b4fc; }
        .color-E { background: #fffbeb; color: #d97706; border-color: #fde68a; }
        .color-F { background: #fff7ed; color: #ea580c; border-color: #fed7aa; }
        .color-G { background: #fff1f2; color: #e11d48; border-color: #fecdd3; }
        .color-H { background: #fff1f2; color: #be123c; border-color: #fda4af; }
        .color-I { background: #450a0a; color: #ffffff; border-color: #991b1b; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-item { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-indigo-700 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
                <div class="bg-white p-2 rounded-xl"><i class="fa-solid fa-notes-medical text-indigo-700 text-lg"></i></div>
                <div>
                    <h1 class="text-base font-bold leading-none">Incident Report</h1>
                    <p class="text-[10px] text-indigo-200 uppercase tracking-wider">ระบบจัดการความเสี่ยง</p>
                </div>
            </div>
            <button id="navAdminBtn" onclick="openAdminModal()" class="bg-indigo-600 border border-indigo-400 px-3 py-1.5 rounded-xl text-xs font-bold hover:bg-indigo-500 transition-colors">
                <i class="fa-solid fa-lock mr-1"></i> Admin Dashboard
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- User Form View -->
        <section id="view-user-form" class="space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center">
                    <i class="fa-solid fa-pen-to-square mr-2 text-indigo-500"></i> บันทึกข้อมูลอุบัติการณ์
                </h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">วันที่เกิดเหตุ</label>
                            <input type="date" id="incidentDate" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">HN ผู้ป่วย</label>
                            <input type="text" id="hn" placeholder="ระบุ HN" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">ประเภทอุบัติการณ์</label>
                        <select id="incidentType" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">-- โปรดเลือกประเภทอุบัติการณ์ --</option>
                            <option value="Identifaction">Identifaction (ระบุตัวผู้ป่วยผิดพลาด)</option>
                            <option value="Unplanned CPR">Unplanned CPR (ผู้ป่วยได้รับการปั๊มหัวใจ โดยไม่ได้วางแผน)</option>
                            <option value="Unplanned ICU">Unplanned ICU (ผู้ป่วยต้องย้ายหอผู้ป่วยวิกฤต โดยไม่ได้วางแผน)</option>
                            <option value="Missed Diagnosis">Missed Diagnosis (วินิจฉัยผิดพลาด)</option>
                            <option value="Transfer Safety">Transfer Safety (การบริหารจัดการความปลอดภัยระหว่างการเคลื่อนย้าย)</option>
                            <option value="Falling">Falling (ผู้ป่วยตกเตียง/พลัดตกหกล้ม)</option>
                            <option value="ท่อเลื่อนหลุด">ท่อเลื่อนหลุด</option>
                            <option value="Phlebitis">Phlebitis</option>
                            <option value="แผลกดทับเกิดขึ้นใหม่">แผลกดทับเกิดขึ้นใหม่</option>
                            <option value="เครื่องมือชำรุด/ไม่เพียงพอ">เครื่องมือชำรุด/ไม่เพียงพอ</option>
                            <option value="โครงสร้าง/สิ่งแวดล้อม/ความปลอดภัย">โครงสร้าง/สิ่งแวดล้อม/ความปลอดภัย</option>
                            <option value="การสื่อสารผิดพลาด">การสื่อสารผิดพลาด</option>
                            <option value="อื่น ๆ">อื่น ๆ</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">รายละเอียดเพิ่มเติม (Details)</label>
                        <textarea id="incidentDetails" rows="3" placeholder="ระบุรายละเอียดเชิงลึก (ถ้ามี)..." class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-3">ระดับความรุนแรง (A-I)</label>
                        <div class="grid grid-cols-3 md:grid-cols-9 gap-2">
                            <div onclick="selectSeverity('A')" id="sev-A" class="severity-badge color-A">A</div>
                            <div onclick="selectSeverity('B')" id="sev-B" class="severity-badge color-B">B</div>
                            <div onclick="selectSeverity('C')" id="sev-C" class="severity-badge color-C">C</div>
                            <div onclick="selectSeverity('D')" id="sev-D" class="severity-badge color-D">D</div>
                            <div onclick="selectSeverity('E')" id="sev-E" class="severity-badge color-E">E</div>
                            <div onclick="selectSeverity('F')" id="sev-F" class="severity-badge color-F">F</div>
                            <div onclick="selectSeverity('G')" id="sev-G" class="severity-badge color-G">G</div>
                            <div onclick="selectSeverity('H')" id="sev-H" class="severity-badge color-H">H</div>
                            <div onclick="selectSeverity('I')" id="sev-I" class="severity-badge color-I">I</div>
                        </div>
                        
                        <div id="severityDescBox" class="mt-3 p-4 rounded-2xl bg-indigo-50 border border-indigo-100 hidden animate-item">
                            <h4 class="text-sm font-bold text-indigo-700 flex items-center mb-1">
                                <i class="fa-solid fa-circle-info mr-2"></i> <span id="descTitle">LEVEL</span>
                            </h4>
                            <p id="descScenario" class="text-[13px] text-slate-700 font-medium mb-2 leading-relaxed"></p>
                            <div class="bg-white/60 p-2 rounded-lg">
                                <p class="text-[11px] text-slate-400 font-bold uppercase mb-0.5">ตัวอย่าง:</p>
                                <p id="descExample" class="text-[12px] text-slate-600 italic"></p>
                            </div>
                        </div>
                        <input type="hidden" id="selectedSeverity">
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase mb-1">ผู้รายงาน</label>
                        <input type="text" id="reporter" placeholder="ชื่อ-นามสกุล" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 outline-none">
                    </div>
                    <button onclick="submitIncident()" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all">
                        <span>ส่งรายงานเข้าระบบ</span>
                    </button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center">
                    <i class="fa-solid fa-clock-rotate-left mr-2 text-indigo-400"></i> ประวัติการรายงานล่าสุด
                </h3>
                <div id="userHistoryList" class="space-y-4">
                    <div class="text-center py-4 text-slate-400 text-xs italic">กำลังโหลด...</div>
                </div>
            </div>
        </section>

        <!-- Admin Dashboard View -->
        <section id="view-admin" class="hidden space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold text-slate-800">Admin Dashboard</h2>
                <button onclick="showView('user-form')" class="bg-white px-4 py-2 rounded-xl text-xs font-bold text-slate-500 shadow-sm border border-slate-200">
                    <i class="fa-solid fa-arrow-left mr-1"></i> กลับหน้าบันทึก
                </button>
            </div>
            
            <!-- Statistics Dashboard -->
            <div id="adminStats" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <div class="glass-card p-4 border-l-4 border-indigo-600">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">ข้อมูลทั้งหมด</p>
                    <div class="flex flex-col">
                        <p id="statTotal" class="text-2xl font-bold">0</p>
                        <div class="text-[10px] text-slate-500 flex justify-between mt-1">
                            <span>ลง HRMS: <span id="statSuccess" class="font-bold text-emerald-600">0</span></span>
                            <span>ค้าง: <span id="statPending" class="font-bold text-rose-500">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="glass-card p-4 border-l-4 border-slate-400">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">ระดับ A-B</p>
                    <p id="statAB" class="text-2xl font-bold text-slate-700">0</p>
                </div>
                <div class="glass-card p-4 border-l-4 border-indigo-400">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">ระดับ C-D</p>
                    <p id="statCD" class="text-2xl font-bold text-indigo-600">0</p>
                </div>
                <div class="glass-card p-4 border-l-4 border-orange-500">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">ระดับ E-I</p>
                    <p id="statEI" class="text-2xl font-bold text-orange-600">0</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="glass-card p-4 space-y-3">
                <p class="text-[11px] font-bold text-slate-400 uppercase">ตัวกรองข้อมูล</p>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="col-span-1">
                        <label class="text-[10px] text-slate-400">จากเดือน/ปี</label>
                        <input type="month" id="filterStart" onchange="renderAdminList()" class="w-full text-xs p-2 rounded-lg border border-slate-200">
                    </div>
                    <div class="col-span-1">
                        <label class="text-[10px] text-slate-400">ถึงเดือน/ปี</label>
                        <input type="month" id="filterEnd" onchange="renderAdminList()" class="w-full text-xs p-2 rounded-lg border border-slate-200">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-slate-400">ระดับความรุนแรง</label>
                        <select id="filterSeverity" onchange="renderAdminList()" class="w-full text-xs p-2 rounded-lg border border-slate-200">
                            <option value="">ทั้งหมด (A-I)</option>
                            <option value="A">ระดับ A</option>
                            <option value="B">ระดับ B</option>
                            <option value="C">ระดับ C</option>
                            <option value="D">ระดับ D</option>
                            <option value="E">ระดับ E</option>
                            <option value="F">ระดับ F</option>
                            <option value="G">ระดับ G</option>
                            <option value="H">ระดับ H</option>
                            <option value="I">ระดับ I</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="adminList" class="space-y-3">
                <!-- Records will load here -->
            </div>
        </section>
    </main>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-2">Admin Login</h3>
            <input type="password" id="adminPass" placeholder="••••••••" class="w-full p-4 rounded-2xl border-2 border-slate-100 text-center text-2xl mb-6 outline-none focus:border-indigo-500">
            <div class="flex space-x-3">
                <button onclick="closeAdminModal()" class="flex-1 py-4 text-slate-400 font-bold">ยกเลิก</button>
                <button onclick="checkAdminPass()" class="flex-1 bg-indigo-600 text-white rounded-2xl font-bold">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwb-wyJREZFhqN5BY5a5xLlim9b_2PSRB_j8s2VLypBw6ZimvbsmQLMCksET7Fk-4N7/exec"; 
        const ADMIN_PASS = "toei0939";
        
        let allIncidents = [];
        const SEV_MAP = {
            'A': { title: 'LEVEL A', scenario: 'ยังไม่เกิดเหตุการณ์ แต่พบความเสี่ยงก่อนถึงผู้ป่วย', example: 'พบสายไฟชำรุดบริเวณเตียงผู้ป่วยแต่แจ้งซ่อมทันก่อนคนไข้ถูกไฟดูด', color: 'color-A' },
            'B': { title: 'LEVEL B', scenario: 'เกิดความคลาดเคลื่อนแล้ว แต่ยังไม่ถึงตัวผู้ป่วย', example: 'พยาบาลหยิบสายปัสสาวะผิดขนาดเตรียมใส่ แต่ทักท้วงกันทันก่อนลงมือ', color: 'color-B' },
            'C': { title: 'LEVEL C', scenario: 'เหตุการณ์ถึงตัวผู้ป่วยแล้ว แต่ไม่เกิดอันตราย', example: 'ระบุตัวผู้ป่วยผิดคนขณะจะเจาะเลือด แต่เข็มยังไม่ทิ่ม หรือเจาะแล้วแต่ไม่มีผลเสีย', color: 'color-C' },
            'D': { title: 'LEVEL D', scenario: 'เหตุการณ์ถึงตัวผู้ป่วย ไม่เกิดอันตราย แต่ต้องเฝ้าระวังเพิ่ม', example: 'ผู้ป่วยพยายามลุกจากเตียงเองจนล้มก้นกระแทก แต่ X-ray แล้วปกติ ต้องสังเกตอาการ', color: 'color-D' },
            'E': { title: 'LEVEL E', scenario: 'เกิดอันตรายชั่วคราว และต้องได้รับการรักษาเพิ่ม', example: 'ผู้ป่วยเกิดแผลกดทับ (Pressure Sore) ระดับ 1-2 ระหว่างนอนโรงพยาบาล', color: 'color-E' },
            'F': { title: 'LEVEL F', scenario: 'เกิดอันตรายชั่วคราว ทำให้นอนโรงพยาบาลนานขึ้น', example: 'ผู้ป่วยติดเชื้อในกระแสเลือดจากการคาสายสวนปัสสาวะ ทำให้ต้องอยู่รักษาต่อนานขึ้น', color: 'color-F' },
            'G': { title: 'LEVEL G', scenario: 'เกิดอันตรายถาวร/พิการ หรือสูญเสียหน้าที่อวัยวะ', example: 'ผู้ป่วยลื่นล้มในห้องน้ำจนกระดูกสะโพกหัก ทำให้เดินไม่ได้ถาวร', color: 'color-G' },
            'H': { title: 'LEVEL H', scenario: 'เกิดเหตุวิกฤต เป็นอันตรายต่อชีวิต ต้องกู้ชีพ (CPR)', example: 'ผู้ป่วยเกิดภาวะช็อกจากการใส่สายสวนหัวใจ หรือสำลักอาหารจนหายใจไม่ออกต้อง CPR', color: 'color-H' },
            'I': { title: 'LEVEL I', scenario: 'ผู้ป่วยเสียชีวิตจากอุบัติการณ์โดยตรง', example: 'ผู้ป่วยพลัดตกเตียงจนเลือดออกในสมองและเสียชีวิตในเวลาต่อมา', color: 'color-I' }
        };

        window.onload = fetchInitialHistory;

        function selectSeverity(code) {
            document.getElementById('selectedSeverity').value = code;
            document.querySelectorAll('.severity-badge').forEach(el => el.classList.remove('severity-active'));
            document.getElementById(`sev-${code}`).classList.add('severity-active');
            
            const descBox = document.getElementById('severityDescBox');
            const info = SEV_MAP[code];
            
            descBox.classList.remove('hidden');
            document.getElementById('descTitle').innerText = info.title;
            document.getElementById('descScenario').innerText = info.scenario;
            document.getElementById('descExample').innerText = info.example;
        }

        async function fetchInitialHistory() {
            const list = document.getElementById('userHistoryList');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const result = await res.json();
                if (result.status === 'success') {
                    allIncidents = (result.data || []).filter(i => i && i.ID).reverse();
                    renderUserHistory();
                }
            } catch (e) { 
                list.innerHTML = `<div class="text-center text-rose-500 text-xs italic">ไม่สามารถดึงข้อมูลได้</div>`; 
            }
        }

        function renderUserHistory() {
            const list = document.getElementById('userHistoryList');
            const recent = allIncidents.slice(0, 5);
            if (recent.length === 0) { list.innerHTML = '<p class="text-center py-4 text-slate-400 text-xs">ไม่พบประวัติการรายงาน</p>'; return; }
            
            list.innerHTML = recent.map(item => `
                <div class="p-5 bg-white rounded-2xl border border-slate-100 shadow-sm animate-item">
                    <div class="flex items-center space-x-3 mb-2">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold border-2 shrink-0 ${SEV_MAP[item.Severity]?.color || ''}">${item.Severity || '?'}</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] text-slate-400 font-bold uppercase truncate">HN: ${item.HN || '-'} | ${String(item.Date || '').split('T')[0]}</p>
                            <p class="text-[13px] text-slate-800 font-bold truncate">${item.Type || '-'}</p>
                        </div>
                    </div>
                    <!-- แก้ไข: แสดง Details แบบเต็ม ไม่ย่อ -->
                    <p class="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl border border-slate-100 whitespace-pre-wrap">${item.Details || 'ไม่มีรายละเอียด'}</p>
                </div>
            `).join('');
        }

        async function submitIncident() {
            const btn = document.getElementById('submitBtn');
            const data = {
                action: 'create',
                id: "ID-" + Date.now(),
                Date: document.getElementById('incidentDate').value,
                HN: document.getElementById('hn').value || '-',
                Type: document.getElementById('incidentType').value,
                Details: document.getElementById('incidentDetails').value,
                Severity: document.getElementById('selectedSeverity').value,
                Reporter: document.getElementById('reporter').value,
                HRMS_Status: 'Pending'
            };

            if (!data.Date || !data.Type || !data.Severity || !data.Reporter) {
                alert('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> กำลังส่งข้อมูล...';
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert('บันทึกข้อมูลเรียบร้อย');
                location.reload();
            } catch (e) { alert('ล้มเหลว'); btn.disabled = false; btn.innerHTML = 'ส่งรายงานเข้าระบบ'; }
        }

        // Admin Dashboard Logic
        function openAdminModal() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('adminModal').classList.add('hidden'); document.getElementById('adminPass').value = ''; }
        
        function checkAdminPass() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) { 
                closeAdminModal(); 
                showView('admin'); 
            } else { 
                alert('รหัสผ่านไม่ถูกต้อง'); 
            }
        }

        function showView(view) {
            document.getElementById('view-user-form').classList.toggle('hidden', view !== 'user-form');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
            if (view === 'admin') fetchAdminData();
        }

        async function fetchAdminData() {
            const list = document.getElementById('adminList');
            list.innerHTML = '<p class="text-center py-10"><i class="fa-solid fa-spinner animate-spin"></i> กำลังดึงข้อมูลล่าสุด...</p>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const result = await res.json();
                if (result.status === 'success') {
                    allIncidents = (result.data || []).filter(i => i && i.ID).reverse();
                    renderAdminList();
                }
            } catch (e) { list.innerHTML = '<p class="text-center py-10 text-rose-500">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>'; }
        }

        function renderAdminList() {
            const list = document.getElementById('adminList');
            const fStart = document.getElementById('filterStart').value;
            const fEnd = document.getElementById('filterEnd').value;
            const fSev = document.getElementById('filterSeverity').value;

            // Filter logic
            const filtered = allIncidents.filter(item => {
                const itemDate = new Date(item.Date);
                const itemMonth = itemDate.toISOString().slice(0, 7); // "YYYY-MM"
                
                let passDate = true;
                if (fStart && itemMonth < fStart) passDate = false;
                if (fEnd && itemMonth > fEnd) passDate = false;
                
                let passSev = true;
                if (fSev && item.Severity !== fSev) passSev = false;
                
                return passDate && passSev;
            });

            // Update Stats
            document.getElementById('statTotal').innerText = filtered.length;
            const successCount = filtered.filter(i => i.HRMS_Status === 'Completed').length;
            document.getElementById('statSuccess').innerText = successCount;
            document.getElementById('statPending').innerText = filtered.length - successCount;

            document.getElementById('statAB').innerText = filtered.filter(i => ['A', 'B'].includes(i.Severity)).length;
            document.getElementById('statCD').innerText = filtered.filter(i => ['C', 'D'].includes(i.Severity)).length;
            document.getElementById('statEI').innerText = filtered.filter(i => ['E', 'F', 'G', 'H', 'I'].includes(i.Severity)).length;

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-center py-10 text-slate-400 italic">ไม่พบข้อมูลตามตัวกรองที่ระบุ</p>';
                return;
            }

            list.innerHTML = filtered.map(item => `
                <div class="p-5 bg-white rounded-2xl border border-slate-100 shadow-sm animate-item">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold border-2 ${SEV_MAP[item.Severity]?.color || ''}">${item.Severity}</div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">HN: ${item.HN} | ${String(item.Date).split('T')[0]}</p>
                                <p class="text-sm font-bold text-slate-800">${item.Type}</p>
                            </div>
                        </div>
                        <div id="btn-container-${item.ID}">
                            ${item.HRMS_Status === 'Completed' 
                                ? '<span class="flex items-center text-[10px] bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-xl font-bold shadow-sm"><i class="fa-solid fa-check-circle mr-1"></i> ลง HRMS แล้ว</span>'
                                : `<button onclick="markDone('${item.ID}')" class="text-[10px] bg-indigo-600 text-white px-3 py-1.5 rounded-xl font-bold shadow-indigo-200 shadow-md hover:bg-indigo-700 active:scale-95 transition-all">ยืนยันลง HRMS</button>`}
                        </div>
                    </div>
                    <p class="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl border border-slate-100 whitespace-pre-wrap">${item.Details || 'ไม่มีรายละเอียด'}</p>
                    <div class="flex justify-between items-center mt-3">
                        <p class="text-[9px] text-slate-400 italic">โดย: ${item.Reporter}</p>
                        <p class="text-[9px] text-slate-300">ID: ${item.ID}</p>
                    </div>
                </div>
            `).join('');
        }

        async function markDone(id) {
            const btnContainer = document.getElementById(`btn-container-${id}`);
            const originalHTML = btnContainer.innerHTML;

            if (!confirm('ยืนยันว่าลงระบบ HRMS เรียบร้อยแล้ว? ระบบจะทำการอัปเดต Google Sheet ทันที')) return;
            
            btnContainer.innerHTML = '<i class="fa-solid fa-spinner animate-spin text-indigo-500 text-sm"></i>';
            
            try {
                // ส่งข้อมูลอัปเดตไปยัง Apps Script
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ 
                        action: 'update_hrms', 
                        id: id, 
                        status: 'Completed' 
                    }) 
                });
                
                // อัปเดตข้อมูลใน Memory ทันที เพื่อให้ Refresh แล้วสถานะยังอยู่ (ถ้า Script ทำงานถูกต้อง)
                const incidentIndex = allIncidents.findIndex(i => i.ID === id);
                if (incidentIndex !== -1) {
                    allIncidents[incidentIndex].HRMS_Status = 'Completed';
                }

                // สั่งโหลดข้อมูลใหม่เพื่อให้แน่ใจว่าค่าใน Sheet ถูกต้อง
                setTimeout(() => {
                    fetchAdminData();
                }, 500);

            } catch (e) { 
                alert('เกิดข้อผิดพลาดในการอัปเดตข้อมูล'); 
                btnContainer.innerHTML = originalHTML;
            }
        }
    </script>
</body>
</html>
